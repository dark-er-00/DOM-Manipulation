<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DOM Methods Demo</title>
    </head>
    <body>
        <h3>Choose an Operation</h3>
        <p>
            1 = appendChild (Add Banana at the end)<br>
            2 = insertBefore (Insert Oranger before the second fruit)<br>
            3 = prepend (Add Mango at the beginning)
        </p>
        <input type="text" id="choiceInput" placeholder="Enter 1, 2, 3">
        <button id="addButton">Add</button>
        <h3>Fruit List</h3>
        <ul id="fruitlist">
            <li>Apple</li>
            <li>Strawberry</li>
        </ul>
        <script src="script.js"></script>
    </body>
</html>
